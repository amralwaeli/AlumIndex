spring:
  datasource:
    url: jdbc:h2:mem:alumindex_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

alumindex:
  jwt:
    secret: test-secret-must-be-32-chars-long!!
    expiration-ms: 3600000
  openai:
    api-key: test-key
