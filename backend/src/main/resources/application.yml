spring:
  application:
    name: alumindex-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alumindex}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Must exceed alumindex.import.concurrency so parallel import workers,
      # the progress writer, and live status-poll requests all get a connection.
      maximum-pool-size: ${DB_POOL_SIZE:15}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # Batch the per-chunk inserts/updates into multi-row JDBC statements.
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      # Disk-backed by the servlet container (not heap); precise cap enforced in CsvXlsxParser.
      max-file-size: 205MB
      max-request-size: 210MB
      file-size-threshold: 1MB   # spill to disk early so large uploads never sit in heap

alumindex:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32-chars}
    expiration-ms: 86400000  # 24 hours
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    temperature: 0
  import:
    # Parallel rows normalised at once. Higher = faster imports, but stay
    # under spring.datasource.hikari.maximum-pool-size and your OpenAI rate tier.
    concurrency: ${IMPORT_CONCURRENCY:8}
    # Rows held in memory at once. Keeps peak heap bounded regardless of file size;
    # processed as a unit (dedupe + bucket + flush progress) before the next chunk.
    chunk-size: ${IMPORT_CHUNK_SIZE:500}
  mail:
    # Email is sent via Resend's HTTPS API (not SMTP) so it works on hosts that
    # block outbound SMTP ports, e.g. Render's free tier. Get an API key at
    # resend.com and verify the sending domain before sending.
    resend-api-key: ${RESEND_API_KEY:}
    from: ${MAIL_FROM:}                     # must be on a Resend-verified domain
    from-name: ${MAIL_FROM_NAME:AlumIndex}
  frontend:
    origin: ${FRONTEND_ORIGIN:http://localhost:5173}

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
